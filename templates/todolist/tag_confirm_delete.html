{% extends "base.html" %}

{% block content %}
    <h2 class="text-danger mb-4">Delete Tag</h2>
    
    <p class="fs-5">Are you sure you want to delete the tag: <strong>"{{ tag.name }}"</strong>?</p>

    <form method="post" class="mt-4">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url "todolist:tag-list" %}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
{% endblock %}
