{% extends "base.html" %}

{% block content %}
    <h2 class="text-danger mb-4">Delete Task</h2>
    
    <p class="fs-5">Are you sure you want to delete the task: <br> 
       <strong>"{{ task.content }}"</strong>?
    </p>

    <form method="post" class="mt-4">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url "todolist:task-list" %}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
{% endblock %}
