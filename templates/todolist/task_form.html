{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
    <h2 class="mb-4">
        {% if object %}
            Update Task
        {% else %}
            Add a new Task
        {% endif %}
    </h2>

    <form method="post" class="w-50">
        {% csrf_token %}
        
        {{ form|crispy }}
        
        <div class="mt-4">
            <button type="submit" class="btn btn-success">Save</button>
            <a href="{% url "todolist:task-list" %}" class="btn btn-secondary ms-2">Cancel</a>
        </div>
    </form>
{% endblock %}
